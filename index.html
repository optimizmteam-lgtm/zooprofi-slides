<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ZooProfi Slides</title>
    <style>
      :root {
        color-scheme: dark;
      }
      body {
        margin: 0;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
        background: #0b1220;
        color: #e5e7eb;
      }
      main {
        max-width: 860px;
        margin: 0 auto;
        padding: 40px 20px;
      }
      h1 {
        margin: 0 0 12px;
        font-size: 28px;
      }
      p {
        margin: 0 0 24px;
        color: #aab2c0;
        line-height: 1.5;
      }
      a.card {
        display: block;
        padding: 18px 18px;
        border-radius: 16px;
        border: 1px solid rgba(255, 255, 255, 0.12);
        background: rgba(255, 255, 255, 0.04);
        color: inherit;
        text-decoration: none;
        margin: 12px 0;
      }
      a.card:hover {
        border-color: rgba(255, 255, 255, 0.22);
        background: rgba(255, 255, 255, 0.07);
      }
      .title {
        font-weight: 700;
        margin-bottom: 6px;
      }
      .hint {
        font-size: 13px;
        color: #aab2c0;
      }
      code {
        color: #c7d2fe;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>ZooProfi Slides</h1>
      <p>Статические HTML-презентации для встраивания через <code>&lt;iframe&gt;</code>.</p>

      <a class="card" href="./zooprofi/">
        <div class="title">Zoo Profi</div>
        <div class="hint">./zooprofi/</div>
      </a>

      <a class="card" href="./zooprofi-partner/">
        <div class="title">Партнёрство с производителем</div>
        <div class="hint">./zooprofi-partner/</div>
      </a>
    </main>
  </body>
</html>
